    <style>
        :root {
            --primary: #6366f1;
            --accent: #f43f5e;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, var(--bg), #1e293b); color: #fff; padding-bottom: 30px; }
        
        .header { text-align: center; padding: 40px 20px; }
        .header h1 { font-size: 1.8rem; margin-bottom: 10px; background: linear-gradient(to right, #818cf8, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .container { max-width: 500px; margin: 0 auto; padding: 0 15px; }
        
        .tabs-container { display: flex; gap: 5px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 12px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; cursor: pointer; text-align: center; border-radius: 8px; font-size: 0.85rem; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); }
        
        .tab-content { display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }
        
        .offer-card { background: var(--card); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; text-decoration: none; color: white; transition: 0.3s; }
        .offer-card:hover { border-color: var(--primary); transform: scale(1.02); }
        
        .icon-box { width: 40px; height: 40px; background: rgba(99, 102, 241, 0.2); color: #818cf8; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 15px; }
        
        .btn-claim { background: var(--accent); padding: 8px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; box-shadow: 0 4px 15px rgba(244, 63, 94, 0.3); animation: pulse 2s infinite; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(244, 63, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); } }
    </style>
</head>
<body>

        <div class="tab-btn" onclick="switchTab(event, 'panel2')">Panel 2</div>
        <div class="tab-btn" onclick="switchTab(event, 'panel3')">Panel 3</div>
        <div class="tab-btn" onclick="switchTab(event, 'bigPanel')">Big Panel</div>

    <div id="panel1" class="tab-content active"></div>

    function render() {
        for (let p in data) {

                    <a href="${o[1]}" class="offer-card">

                            </div>
                        </div>

                    </a>`).join('');
            }
        }
    }
    
    function switchTab(e, id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }
    
    render();
</script>
